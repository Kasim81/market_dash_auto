name: Refresh Manuals
# Recurring documentation job: runs Claude headlessly to refresh the two
# hand-written contributor manuals (manuals/technical_manual.md and
# manuals/forward_plan.md) so they keep tracking the live codebase, and opens a
# PULL REQUEST for human review rather than committing prose to a branch
# unreviewed. The manuals are prose that needs editorial judgement, which is why
# this is an LLM job and not a deterministic script.
#
# ── One-time setup required before the first run (repo admin) ──────────────
#   1. Install the Claude GitHub App on this repo:  https://github.com/apps/claude
#      (grant Contents, Issues, and Pull requests: Read & write)
#   2. Add an `ANTHROPIC_API_KEY` repository secret (console.anthropic.com).
# Until both exist the job will fail fast on the action step — that is expected.
#
# After setup you can trigger an immediate catch-up run from the Actions tab
# (Run workflow) instead of waiting for the weekly cron.

on:
  schedule:
    # Weekly, Mondays 05:17 UTC. Doc drift tracks *code* changes, not the daily
    # data refresh, so a weekly cadence is plenty; the odd minute dodges the
    # top-of-hour Actions congestion. A week with no material code change is a
    # cheap no-op (the prompt tells Claude to make no changes / open no PR).
    - cron: '17 5 * * 1'
  workflow_dispatch:  # manual trigger for an on-demand refresh

# Only one refresh in flight at a time; a newer run supersedes an older one.
concurrency:
  group: refresh-manuals
  cancel-in-progress: false

permissions:
  contents: write        # push the doc branch
  pull-requests: write   # open the review PR

jobs:
  refresh-manuals:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # hard cap on cost / runaway
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0   # full history so Claude can read recent commits/diffs

      - name: Refresh manuals with Claude
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          claude_args: |
            --max-turns 60
            --model claude-sonnet-4-6
            --allowedTools Read,Edit,Write,Glob,Grep,Bash
          prompt: |
            You are running as a scheduled documentation job in GitHub Actions.

            ## Goal
            Update the two hand-written contributor manuals so they accurately
            describe the CURRENT state of this codebase, then open ONE pull
            request with the changes for human review.

            The two files — and the ONLY files you may modify — are:
              - manuals/technical_manual.md  (authoritative record of current code state)
              - manuals/forward_plan.md      (phase summary, priority queue, roadmap, chronology)

            Do NOT edit any code, data, CSV, or workflow file. Do NOT touch any
            file outside those two manuals. If you find a code bug, mention it in
            the PR body — do not fix it here.

            ## How to find what drifted
            Compare what the manuals claim against the live repo. Use git to see
            what changed recently:
              git log --since="60 days ago" --pretty='%h %ad %s' --date=short
              git diff --stat HEAD~20..HEAD   (adjust range as useful)
            Then verify the manuals against reality for at least these areas:
              - Data sources & APIs: cross-check the prose source list against the
                actual modules in sources/*.py and the curated libraries
                data/macro_library_*.csv. Add new sources, remove deleted ones.
              - Coverage GAPS: call out countries/series with no dedicated source
                (e.g. a country covered only by World Bank / IMF aggregators, with
                no national-statistics-office source wired). Absence is information.
              - GitHub Secrets table (technical manual §12): reconcile every row
                against the env: block of .github/workflows/update_data.yml and the
                modules that read each key. Add/clarify/remove rows so the table
                matches what the workflow actually passes and what code consumes.
              - Module reference (§9.x): module list, counts and approximate line
                counts. Recompute counts from the tree (e.g. `ls sources/*.py`,
                `wc -l`); update the figures rather than leaving stale numbers.
              - Schedule / operational notes: confirm the cron(s) and any workflow
                env settings described match the actual workflow files (note this
                new Refresh Manuals workflow exists too).
              - Known issues / status and the forward-plan priority queue (§2) and
                chronology (§4): retire items that are now done, add newly
                completed or newly discovered work, keep dates accurate.
              - Provisional / unverified wiring (e.g. sources awaiting their first
                successful credentialed fetch): describe status truthfully.

            ## Editorial rules
            - Match the existing voice, structure, heading style, and the dated
              entry convention already used in each manual. Do not restructure or
              reformat sections you are not changing.
            - Be factual and specific; never invent behaviour. If unsure whether
              something changed, verify it in the code before writing it.
            - Bump the "> Last updated: YYYY-MM-DD" stamp at the top of any manual
              you change to today's date (UTC).
            - Keep the diff tight: change only what is actually stale.

            ## Output
            - If, after checking, nothing is materially stale: make NO changes,
              open NO pull request, and stop. Print a one-line note saying the
              manuals are already current.
            - Otherwise: create a new branch named
              `docs/manual-refresh-<YYYY-MM-DD>`, commit ONLY the two manual files
              with a clear message, push it, and open a pull request titled
              "Docs: refresh technical manual & forward plan (<YYYY-MM-DD>)".
              The PR body must list the concrete changes you made, grouped by
              manual and section, each with a one-line reason tied to a code
              fact (file/commit). Do not merge the PR. Do not push to the default
              branch directly.
