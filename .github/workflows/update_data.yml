name: Update Market Data
on:
  schedule:
    # 03:17 UTC (04:17 BST / 03:17 GMT) — needs to finish before the 06:00
    # UK local automations that consume this data. The odd minute avoids
    # GitHub Actions' scheduled-run congestion at the top of the hour, which
    # was delaying the previous 06:00 UTC run by 1-2+ hours.
    - cron: '17 3 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
permissions:
  contents: write
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Fetch market data
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
      run: |
        git pull --rebase
        python fetch_data.py
    - name: Rebuild indicator explorer
      run: |
        cd docs
        python build_html.py
    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add -f data/market_data.csv
        [ -f data/macro_us.csv ] && git add -f data/macro_us.csv || true
        [ -f data/macro_us_hist.csv ] && git add -f data/macro_us_hist.csv || true
        [ -f data/macro_intl.csv ] && git add -f data/macro_intl.csv || true
        [ -f data/macro_intl_hist.csv ] && git add -f data/macro_intl_hist.csv || true
        [ -f data/market_data_comp.csv ] && git add -f data/market_data_comp.csv || true
        [ -f data/market_data_comp_hist.csv ] && git add -f data/market_data_comp_hist.csv || true
        [ -f data/macro_market.csv ] && git add -f data/macro_market.csv || true
        [ -f data/macro_market_hist.csv ] && git add -f data/macro_market_hist.csv || true
        [ -f data/macro_dbnomics.csv ] && git add -f data/macro_dbnomics.csv || true
        [ -f data/macro_dbnomics_hist.csv ] && git add -f data/macro_dbnomics_hist.csv || true
        [ -f data/macro_ifo.csv ] && git add -f data/macro_ifo.csv || true
        [ -f data/macro_ifo_hist.csv ] && git add -f data/macro_ifo_hist.csv || true
        [ -f docs/indicator_explorer.html ] && git add -f docs/indicator_explorer.html || true
        [ -f docs/indicator_explorer_mkt.js ] && git add -f docs/indicator_explorer_mkt.js || true
        git diff --staged --quiet || (
          git commit -m "Update market data + explorer - $(date -u '+%Y-%m-%d %H:%M UTC')" &&
          git push
        )
