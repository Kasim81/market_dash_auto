name: Update Market Data
on:
  schedule:
    # 00:34 UTC (01:34 BST / 00:34 GMT) — needs to finish before the 06:00
    # UK local automations that consume this data. The odd minute avoids
    # GitHub Actions' scheduled-run congestion at the top of the hour, which
    # was delaying the previous 06:00 UTC run by 1-2+ hours.
    - cron: '34 0 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
permissions:
  contents: write
  issues: write   # required to post the daily audit comment (§2.6 v2)
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    outputs:
      # §2.C C9: gate for the deploy-pages job — true only on a healthy run
      # (explorer freshly built, no CRITICAL audit).
      deploy_pages: ${{ steps.pages_gate.outputs.deploy }}
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Fetch market data
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
        NASDAQ_DATA_LINK_API_KEY: ${{ secrets.NASDAQ_DATA_LINK_API_KEY }}
        BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        BDF_API_KEY: ${{ secrets.BDF_API_KEY }}
        # Bright Data Web Unlocker — used by sources/ifo.py as a fallback
        # when ifo.de's anti-bot layer serves its 3038-byte HTML challenge
        # in place of the gsk-*.xlsx workbook (§3 broken-source recovery).
        # Free tier = 5,000 requests/month; sources/ifo.py caps per-run
        # spend at 30 calls.  If the secret is unset, the fallback SKIPS
        # silently and ifo degrades to blank rows (current behaviour).
        # BRIGHTDATA_ZONE is optional; defaults to "web_unlocker1".
        BRIGHTDATA_API_KEY: ${{ secrets.BRIGHTDATA_API_KEY }}
        BRIGHTDATA_ZONE: ${{ secrets.BRIGHTDATA_ZONE }}
        # Unbuffered stdout so the live Actions log + pipeline.log reflect
        # progress in real time (block buffering through `tee` previously
        # hid which step a long run was actually on).
        PYTHONUNBUFFERED: "1"
      run: |
        set -o pipefail
        git pull --rebase
        # Pipefail-protected tee so a python crash isn't masked by tee's
        # exit status.  Stdout + stderr both go into pipeline.log so the
        # log is the sole source of truth for what happened in the run.
        python fetch_data.py 2>&1 | tee pipeline.log
    - name: Primary-source smoke tests
      # Live verification that the ultimate/primary sources still fetch recent
      # data: BLS (US CPI / core CPI / unemployment + avg hourly earnings, and
      # the primary-source tie-break over FRED) and INSEE (French business
      # climate, unemployment, GDP — keyless BDM API). Network-gated: each
      # SKIPS if its endpoint is unreachable, so a transient outage never blocks
      # the daily commit. continue-on-error keeps a genuine regression a loud
      # warning (surfaced in the daily Issue via pipeline.log), not a hard build
      # gate — consistent with the data-audit channel. Uses stdlib unittest
      # (pytest is not a pipeline dependency). BLS_API_KEY is optional (keyless
      # v1 works); INSEE needs no key; BdF is key-gated, so BDF_API_KEY must be
      # exposed here too or test_bdf_smoke just skips — which is the whole
      # signal we want on the first credentialed run. (BDF_API_SECRET was
      # retired 2026-06-10 with the migration from the legacy IBM API Connect
      # stack to the Opendatasoft Explore v2.1 stack — the new stack uses a
      # single Apikey header.)
      if: always()
      continue-on-error: true
      env:
        BLS_API_KEY: ${{ secrets.BLS_API_KEY }}
        BDF_API_KEY: ${{ secrets.BDF_API_KEY }}
        ALPHAVANTAGE_API_KEY: ${{ secrets.ALPHAVANTAGE_API_KEY }}
      run: |
        echo "" >> pipeline.log
        echo "=== Primary-source smoke tests (BLS, INSEE, BdF, Alpha Vantage, Shiller, Ken French, JST, Atlanta Fed, NY Fed, SEC EDGAR, IMF SDMX) ===" >> pipeline.log
        python -m unittest test_bls_smoke test_insee_smoke test_bdf_smoke test_alpha_vantage_smoke test_shiller_smoke test_french_smoke test_jst_smoke test_atlanta_fed_smoke test_ny_fed_smoke test_sec_edgar_smoke test_imf_sdmx_smoke test_boe_survey_smoke test_ons_rti_smoke -v 2>&1 | tee -a pipeline.log
    - name: Rebuild indicator explorer
      run: |
        set -o pipefail
        cd docs
        python build_html.py 2>&1 | tee -a ../pipeline.log
    - name: Run data audit
      # Three-section audit (§2.6 v2): A) pipeline.log scrape for fetch
      # outcomes (yfinance dead tickers, FRED persistent HTTP errors —
      # transient retried-then-recovered errors are filtered out by only
      # matching the "— skipping" suffix), B) static checks (countries
      # orphans, indicator-library schema, calculator registration,
      # _get_col column existence), C) value-change staleness on the
      # unified hist.  Outputs data_audit.txt + audit_comment.md at
      # repo root.  Exit code is 0 for everything in Sections A-E —
      # warning channel, not a build gate — EXCEPT the narrow §2.C C8
      # Section F CRITICAL class (protected-tab output empty/all-NaN;
      # hist CSV losing >10% rows/columns vs HEAD): then the audit
      # exits 2, this step goes red for visibility, and
      # data_audit_critical.flag tells the commit step below to SKIP
      # the data files (pipeline.log + audit reports still commit for
      # the post-mortem).
      if: always()
      run: |
        set -o pipefail
        echo "" >> pipeline.log
        echo "" >> pipeline.log
        python data_audit.py 2>&1 | tee -a pipeline.log
    - name: Audit writeback (registry update)
      # §3.1 sub-track 3: track per-ticker dead-list streaks and flip
      # validation_status from CONFIRMED to UNAVAILABLE after N=14
      # consecutive days. Updates data/yfinance_failure_streaks.csv and
      # data/index_library.csv when a streak crosses the threshold;
      # appends a summary line to audit_comment.md so the daily Issue
      # comment captures writeback actions.  Manual override wins —
      # operators can re-set CONFIRMED on a row and the streak restarts.
      if: always()
      run: |
        python audit_writeback.py 2>&1 | tee -a pipeline.log
    - name: Post daily audit to perpetual GitHub Issue
      # Posts a comment to the perpetual "Daily Audit Log" issue so the
      # user gets a GitHub notification email for the day's findings.
      # First line of the comment is the one-sentence ALL CLEAN / N
      # ISSUES summary; collapsible detail sections follow.  If the
      # issue doesn't exist yet (first run) the workflow creates it
      # along with a `daily-audit` label.
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Ensure the label exists
        gh label create daily-audit --color 0366d6 \
          --description "Perpetual daily-audit log issue" 2>/dev/null || true

        # Find the perpetual issue (open, with the label).  If absent, create it.
        ISSUE_NUM=$(gh issue list --label daily-audit --state open --limit 1 \
                       --json number --jq '.[0].number' 2>/dev/null || echo "")
        if [ -z "$ISSUE_NUM" ]; then
          ISSUE_NUM=$(gh issue create \
            --title "Daily Audit Log" \
            --label daily-audit \
            --body "Perpetual issue collecting daily \`data_audit.py\` reports.\n\nClose this issue and the next daily run will create a fresh one." \
            | tail -1 | grep -oE '[0-9]+$')
        fi

        # Post today's comment.  audit_comment.md was written by data_audit.py.
        if [ -f audit_comment.md ]; then
          gh issue comment "$ISSUE_NUM" --body-file audit_comment.md
        else
          gh issue comment "$ISSUE_NUM" --body "Daily audit ran but produced no comment file."
        fi

        # Retention: keep only the most recent 10 comments on the perpetual
        # daily-audit issue.  Each new run's report supersedes earlier ones
        # (every audit is a complete state snapshot, not a delta), so old
        # comments accrete without value.  We delete the oldest ones rather
        # than the newest so the issue's tail always shows recent history.
        # `gh api --paginate` returns oldest-first; `head -n -10` keeps all
        # but the last 10, which we then delete.  Failures are tolerated so
        # the workflow never fails on cleanup alone.
        gh api "repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
          --paginate --jq '.[].id' \
          | head -n -10 \
          | while read -r CID; do
              [ -n "$CID" ] && gh api -X DELETE \
                "repos/${{ github.repository }}/issues/comments/$CID" || true
            done
    - name: Upload run logs artifact
      # §2.C C10: pipeline.log (+ data_audit.txt as a convenience copy) uploaded
      # as a 90-day artifact instead of committed to git every run. `if: always()`
      # so a crashed run still yields the diagnostic log.
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: run-logs-${{ github.run_id }}
        path: |
          pipeline.log
          data_audit.txt
        retention-days: 90
        if-no-files-found: ignore
    - name: Pages deploy gate
      # §2.C C9: decide whether this run's explorer is publishable. Skip on a
      # CRITICAL audit (§2.C C8 wrote data_audit_critical.flag) or when the
      # rebuild step didn't run (explorer absent — e.g. an earlier crash). The
      # output feeds both the upload steps below and the deploy-pages job's `if`.
      if: always()
      id: pages_gate
      run: |
        if [ -f data_audit_critical.flag ] || [ ! -f docs/indicator_explorer.html ]; then
          echo "deploy=false" >> "$GITHUB_OUTPUT"
          echo "Pages deploy gate: SKIP (critical flag present or explorer missing)"
        else
          echo "deploy=true" >> "$GITHUB_OUTPUT"
          echo "Pages deploy gate: OK"
        fi
    - name: Stage explorer for Pages
      # Co-locate the two generated files (the HTML loads the JS by relative
      # <script src>) plus a root redirect so the site root opens the explorer.
      if: always() && steps.pages_gate.outputs.deploy == 'true'
      run: |
        rm -rf _site && mkdir -p _site
        cp docs/indicator_explorer.html _site/indicator_explorer.html
        cp docs/indicator_explorer_mkt.js _site/indicator_explorer_mkt.js
        printf '%s\n' \
          '<!doctype html><meta charset="utf-8">' \
          '<meta http-equiv="refresh" content="0; url=indicator_explorer.html">' \
          '<title>Indicator Explorer</title>' \
          '<a href="indicator_explorer.html">Indicator Explorer</a>' > _site/index.html
    - name: Upload Pages artifact
      if: always() && steps.pages_gate.outputs.deploy == 'true'
      uses: actions/upload-pages-artifact@v3
      with:
        path: _site
    - name: Commit and push if changed
      # `if: always()` so even a crashed run still commits the audit reports
      # so we can diagnose without re-opening the GitHub Actions UI.
      if: always()
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        # §2.C C10 (2026-07-14): pipeline.log is no longer committed (it was
        # rewritten whole every run → permanent churn); it is uploaded as a
        # 90-day workflow artifact by the step below. data_audit.txt stays in
        # git (small, meaningful diffs for >90-day forensics), as does the
        # audit_comment.md that mirrors the daily Issue comment.
        [ -f data_audit.txt ] && git add -f data_audit.txt || true
        [ -f audit_comment.md ] && git add -f audit_comment.md || true
        # §2.C C8 CRITICAL gate: data_audit.py writes this flag (and exits
        # 2, turning its step red) when a Section F CRITICAL fired —
        # protected-tab output empty/all-NaN or a hist CSV losing >10%
        # rows/columns vs HEAD.  Committing those artefacts would bake the
        # catastrophe into git history and downstream automations, so we
        # stop after the diagnostics above (pipeline.log is still uploaded as
        # an artifact).  The flag itself is never committed (explicit adds only).
        if [ -f data_audit_critical.flag ]; then
          echo "CRITICAL audit findings — skipping the data-file commit:"
          cat data_audit_critical.flag
          if ! git diff --staged --quiet; then
            git commit -m "Audit reports only (CRITICAL gate) - $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push || true
          fi
          exit 1
        fi
        # Retire the v1 freshness audit output (replaced by data_audit.txt):
        [ -f freshness_audit.txt ] && git rm -f freshness_audit.txt || true
        [ -f data/market_data.csv ] && git add -f data/market_data.csv || true
        [ -f data/market_data_comp.csv ] && git add -f data/market_data_comp.csv || true
        [ -f data/market_data_comp_hist.csv ] && git add -f data/market_data_comp_hist.csv || true
        [ -f data/macro_market.csv ] && git add -f data/macro_market.csv || true
        [ -f data/macro_market_hist.csv ] && git add -f data/macro_market_hist.csv || true
        [ -f data/macro_economic.csv ] && git add -f data/macro_economic.csv || true
        [ -f data/macro_economic_hist.csv ] && git add -f data/macro_economic_hist.csv || true
        # Pattern-9 sister archives (history preservation) — these were
        # missing from this list until 2026-07-08, so sister updates only
        # persisted when a push-conflict retry's `git add -A` caught them;
        # on the happy path they were silently discarded each run.
        [ -f data/market_data_comp_hist_x.csv ] && git add -f data/market_data_comp_hist_x.csv || true
        [ -f data/macro_economic_hist_x.csv ] && git add -f data/macro_economic_hist_x.csv || true
        [ -f data/macro_market_hist_x.csv ] && git add -f data/macro_market_hist_x.csv || true
        # SEC EDGAR equity fundamentals (revenue + diluted EPS), isolated phase:
        [ -f data/equity_fundamentals.csv ] && git add -f data/equity_fundamentals.csv || true
        # §3.1 sub-track 3 — audit_writeback artefacts:
        [ -f data/yfinance_failure_streaks.csv ] && git add -f data/yfinance_failure_streaks.csv || true
        [ -f data/index_library.csv ] && git add -f data/index_library.csv || true
        # sources/istat.py EDITION cache — pinned vintage per series; mutated
        # by the source module on cache miss / edition turnover, kept on disk
        # so daily runs start hot.
        [ -f data/istat_edition_cache.csv ] && git add -f data/istat_edition_cache.csv || true
        # Retired in Stage 2 commit 13 — removals get committed on next run:
        [ -f data/macro_us.csv ] && git rm -f data/macro_us.csv || true
        [ -f data/macro_us_hist.csv ] && git rm -f data/macro_us_hist.csv || true
        [ -f data/macro_intl.csv ] && git rm -f data/macro_intl.csv || true
        [ -f data/macro_intl_hist.csv ] && git rm -f data/macro_intl_hist.csv || true
        [ -f data/macro_dbnomics.csv ] && git rm -f data/macro_dbnomics.csv || true
        [ -f data/macro_dbnomics_hist.csv ] && git rm -f data/macro_dbnomics_hist.csv || true
        [ -f data/macro_ifo.csv ] && git rm -f data/macro_ifo.csv || true
        [ -f data/macro_ifo_hist.csv ] && git rm -f data/macro_ifo_hist.csv || true
        # §2.C C9 (2026-07-14): the explorer artefacts (docs/indicator_explorer.html
        # ~14 MB + indicator_explorer_mkt.js ~16 MB) are no longer committed to git —
        # they are published to GitHub Pages by the deploy-pages job below. They are
        # gitignored and untracked; nothing stages them here.
        # Retry commit-and-push up to 3 times. Without this, a parallel
        # PR merging onto main during the ~1-2h run window causes the
        # final push to be rejected (e.g. run 27292302120, 2026-06-10).
        # We rebase the staged changes onto the freshly-fetched main and
        # try again; conflicts here surface as a loud failure (data files
        # are runner-output not human-edits, so conflicts shouldn't
        # legitimately happen — if they do, we want them visible).
        if ! git diff --staged --quiet; then
          for attempt in 1 2 3; do
            git commit -m "Update market data + explorer - $(date -u '+%Y-%m-%d %H:%M UTC')"
            if git push; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push rejected on attempt $attempt — rebasing on origin/main and retrying"
            git fetch origin main
            git reset --soft HEAD~1
            git stash --include-untracked
            git rebase origin/main || { echo "Rebase failed — aborting"; git rebase --abort; exit 1; }
            git stash pop
            git add -A
          done
          echo "Push still rejected after 3 attempts — failing loudly"
          exit 1
        fi

  # §2.C C9 (2026-07-14): publish the indicator explorer to GitHub Pages instead
  # of committing the ~30 MB/day of HTML+JS to git. Runs only after a healthy
  # update-data run (deploy_pages gate = true → explorer freshly built, no
  # CRITICAL audit). One-time repo setup: Settings → Pages → Source = "GitHub
  # Actions". Published at https://kasim81.github.io/market_dash_auto/.
  deploy-pages:
    needs: update-data
    if: needs.update-data.outputs.deploy_pages == 'true'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
