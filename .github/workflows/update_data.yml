name: Update Market Data
on:
  schedule:
    # 00:34 UTC (01:34 BST / 00:34 GMT) — needs to finish before the 06:00
    # UK local automations that consume this data. The odd minute avoids
    # GitHub Actions' scheduled-run congestion at the top of the hour, which
    # was delaying the previous 06:00 UTC run by 1-2+ hours.
    - cron: '34 0 * * *'
  workflow_dispatch:  # Allows manual trigger from GitHub UI
permissions:
  contents: write
  issues: write   # required to post the daily audit comment (§2.6 v2)
jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
    - name: Checkout repository
      uses: actions/checkout@v5
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.11'
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    - name: Fetch market data
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
        FMP_API_KEY: ${{ secrets.FMP_API_KEY }}
        ESTAT_APP_ID: ${{ secrets.ESTAT_APP_ID }}
      run: |
        set -o pipefail
        git pull --rebase
        # Pipefail-protected tee so a python crash isn't masked by tee's
        # exit status.  Stdout + stderr both go into pipeline.log so the
        # log is the sole source of truth for what happened in the run.
        python fetch_data.py 2>&1 | tee pipeline.log
    - name: Rebuild indicator explorer
      run: |
        set -o pipefail
        cd docs
        python build_html.py 2>&1 | tee -a ../pipeline.log
    - name: Run data audit
      # Three-section audit (§2.6 v2): A) pipeline.log scrape for fetch
      # outcomes (yfinance dead tickers, FRED persistent HTTP errors —
      # transient retried-then-recovered errors are filtered out by only
      # matching the "— skipping" suffix), B) static checks (countries
      # orphans, indicator-library schema, calculator registration,
      # _get_col column existence), C) value-change staleness on the
      # unified hist.  Outputs data_audit.txt + audit_comment.md at
      # repo root.  Exit code is always 0 — warning channel, not a
      # build gate.
      if: always()
      run: |
        echo "" >> pipeline.log
        echo "" >> pipeline.log
        python data_audit.py 2>&1 | tee -a pipeline.log
    - name: Audit writeback (registry update)
      # §3.1 sub-track 3: track per-ticker dead-list streaks and flip
      # validation_status from CONFIRMED to UNAVAILABLE after N=14
      # consecutive days. Updates data/yfinance_failure_streaks.csv and
      # data/index_library.csv when a streak crosses the threshold;
      # appends a summary line to audit_comment.md so the daily Issue
      # comment captures writeback actions.  Manual override wins —
      # operators can re-set CONFIRMED on a row and the streak restarts.
      if: always()
      run: |
        python audit_writeback.py 2>&1 | tee -a pipeline.log
    - name: Post daily audit to perpetual GitHub Issue
      # Posts a comment to the perpetual "Daily Audit Log" issue so the
      # user gets a GitHub notification email for the day's findings.
      # First line of the comment is the one-sentence ALL CLEAN / N
      # ISSUES summary; collapsible detail sections follow.  If the
      # issue doesn't exist yet (first run) the workflow creates it
      # along with a `daily-audit` label.
      if: always()
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        # Ensure the label exists
        gh label create daily-audit --color 0366d6 \
          --description "Perpetual daily-audit log issue" 2>/dev/null || true

        # Find the perpetual issue (open, with the label).  If absent, create it.
        ISSUE_NUM=$(gh issue list --label daily-audit --state open --limit 1 \
                       --json number --jq '.[0].number' 2>/dev/null || echo "")
        if [ -z "$ISSUE_NUM" ]; then
          ISSUE_NUM=$(gh issue create \
            --title "Daily Audit Log" \
            --label daily-audit \
            --body "Perpetual issue collecting daily \`data_audit.py\` reports.\n\nClose this issue and the next daily run will create a fresh one." \
            | tail -1 | grep -oE '[0-9]+$')
        fi

        # Post today's comment.  audit_comment.md was written by data_audit.py.
        if [ -f audit_comment.md ]; then
          gh issue comment "$ISSUE_NUM" --body-file audit_comment.md
        else
          gh issue comment "$ISSUE_NUM" --body "Daily audit ran but produced no comment file."
        fi

        # Retention: keep only the most recent 10 comments on the perpetual
        # daily-audit issue.  Each new run's report supersedes earlier ones
        # (every audit is a complete state snapshot, not a delta), so old
        # comments accrete without value.  We delete the oldest ones rather
        # than the newest so the issue's tail always shows recent history.
        # `gh api --paginate` returns oldest-first; `head -n -10` keeps all
        # but the last 10, which we then delete.  Failures are tolerated so
        # the workflow never fails on cleanup alone.
        gh api "repos/${{ github.repository }}/issues/$ISSUE_NUM/comments" \
          --paginate --jq '.[].id' \
          | head -n -10 \
          | while read -r CID; do
              [ -n "$CID" ] && gh api -X DELETE \
                "repos/${{ github.repository }}/issues/comments/$CID" || true
            done
    - name: Commit and push if changed
      # `if: always()` so even a crashed run still commits the
      # pipeline.log so we can diagnose without re-opening the GitHub
      # Actions UI.
      if: always()
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        # Pipeline log first — this is the diagnostic record of every
        # run.  Always commit it, even on failure.
        [ -f pipeline.log ] && git add -f pipeline.log || true
        [ -f data_audit.txt ] && git add -f data_audit.txt || true
        [ -f audit_comment.md ] && git add -f audit_comment.md || true
        # Retire the v1 freshness audit output (replaced by data_audit.txt):
        [ -f freshness_audit.txt ] && git rm -f freshness_audit.txt || true
        [ -f data/market_data.csv ] && git add -f data/market_data.csv || true
        [ -f data/market_data_comp.csv ] && git add -f data/market_data_comp.csv || true
        [ -f data/market_data_comp_hist.csv ] && git add -f data/market_data_comp_hist.csv || true
        [ -f data/macro_market.csv ] && git add -f data/macro_market.csv || true
        [ -f data/macro_market_hist.csv ] && git add -f data/macro_market_hist.csv || true
        [ -f data/macro_economic.csv ] && git add -f data/macro_economic.csv || true
        [ -f data/macro_economic_hist.csv ] && git add -f data/macro_economic_hist.csv || true
        # §3.1 sub-track 3 — audit_writeback artefacts:
        [ -f data/yfinance_failure_streaks.csv ] && git add -f data/yfinance_failure_streaks.csv || true
        [ -f data/index_library.csv ] && git add -f data/index_library.csv || true
        # Retired in Stage 2 commit 13 — removals get committed on next run:
        [ -f data/macro_us.csv ] && git rm -f data/macro_us.csv || true
        [ -f data/macro_us_hist.csv ] && git rm -f data/macro_us_hist.csv || true
        [ -f data/macro_intl.csv ] && git rm -f data/macro_intl.csv || true
        [ -f data/macro_intl_hist.csv ] && git rm -f data/macro_intl_hist.csv || true
        [ -f data/macro_dbnomics.csv ] && git rm -f data/macro_dbnomics.csv || true
        [ -f data/macro_dbnomics_hist.csv ] && git rm -f data/macro_dbnomics_hist.csv || true
        [ -f data/macro_ifo.csv ] && git rm -f data/macro_ifo.csv || true
        [ -f data/macro_ifo_hist.csv ] && git rm -f data/macro_ifo_hist.csv || true
        [ -f docs/indicator_explorer.html ] && git add -f docs/indicator_explorer.html || true
        [ -f docs/indicator_explorer_mkt.js ] && git add -f docs/indicator_explorer_mkt.js || true
        git diff --staged --quiet || (
          git commit -m "Update market data + explorer - $(date -u '+%Y-%m-%d %H:%M UTC')" &&
          git push
        )
