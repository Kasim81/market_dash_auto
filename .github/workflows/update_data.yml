name: Update Market Data

on:
  schedule:
    # Run every day at 6 AM UTC (adjust as needed)
    - cron: '0 6 * * *'

    # Run every Monday at 06:30 UTC (before London market open)
    # - cron: '30 6 * * 1'
    # Also run every Thursday at 06:30 UTC for mid-week refresh
    # - cron: '30 6 * * 4'
  workflow_dispatch:  # Allows manual trigger from GitHub UI

permissions:
  contents: write

jobs:
  update-data:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Fetch market data
      env:
        FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      run: |
        git pull --rebase
        python fetch_data.py

    - name: Commit and push if changed
      run: |
        git config --global user.name 'GitHub Actions Bot'
        git config --global user.email 'actions@github.com'
        git add data/market_data.csv data/sentiment_data.csv
        git diff --staged --quiet || (
          git commit -m "Update market data - $(date -u '+%Y-%m-%d %H:%M UTC')" &&
          git push
        )
