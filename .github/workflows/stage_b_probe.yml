name: Stage B Probe

# Manually-triggered probe of T1 fallback candidates for the 9
# forcing-function rows. One-shot utility for forward_plan §3.1 Stage B
# sub-step B.1; can be removed after Stage B closes.
#
# How to run:
#   1. Go to the "Actions" tab in GitHub
#   2. Click "Stage B Probe" in the left sidebar
#   3. Click the "Run workflow" button (top right)
#   4. After the run completes, click into it → click the "probe" job
#      → expand the "Run probe" step to see the output, OR
#      view the rendered "Job Summary" pane.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run probe
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
        run: |
          python3 stage_b_probe.py | tee /tmp/probe_output.txt

      - name: Render output to job summary
        if: always()
        run: |
          {
            echo "# Stage B probe results"
            echo ""
            echo '```'
            cat /tmp/probe_output.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
